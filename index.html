<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 🛡️ Sentinel: Strict CSP to prevent XSS and unauthorized resource loading -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none';">
  <title>Nim</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Nim</h1>

    <div id="setup" class="panel">
      <h2>New Game</h2>
      <div class="setting">
        <label for="mode-select">Mode</label>
        <select id="mode-select">
          <option value="hvh">Human vs Human</option>
          <option value="hva">Human vs AI</option>
        </select>
      </div>
      <div class="setting hidden" id="difficulty-setting">
        <label for="difficulty-select">Difficulty</label>
        <select id="difficulty-select">
          <option value="easy">Easy — AI plays to lose</option>
          <option value="medium">Medium — AI plays randomly, sometimes optimal</option>
          <option value="hard" selected>Hard — AI always plays optimally</option>
        </select>
      </div>
      <div class="setting">
        <label for="variant-select">Variant</label>
        <select id="variant-select">
          <option value="normal">Normal (last to take wins)</option>
          <option value="misere">Misère (last to take loses)</option>
        </select>
      </div>
      <div class="setting">
        <label>Piles</label>
        <div id="pile-inputs">
          <input type="number" class="pile-input" min="1" max="20" value="3">
          <input type="number" class="pile-input" min="1" max="20" value="5">
          <input type="number" class="pile-input" min="1" max="20" value="7">
        </div>
        <div class="pile-buttons">
          <button id="add-pile" class="btn-sm">+ Pile</button>
          <button id="remove-pile" class="btn-sm">− Pile</button>
        </div>
      </div>
      <button id="start-game" class="btn-primary">Start Game</button>
    </div>

    <div id="game" class="panel hidden">
      <div id="status-bar">
        <span id="turn-label"></span>
        <span id="variant-label"></span>
      </div>

      <div id="piles-container"></div>

      <div id="controls">
        <div class="control-row">
          <label for="take-count">Take</label>
          <input type="number" id="take-count" min="1" value="1">
          <span>from pile</span>
          <span id="selected-pile-label">—</span>
        </div>
        <button id="take-btn" class="btn-primary" disabled>Take Stones</button>
      </div>

      <div id="result-banner" class="hidden">
        <p id="result-text"></p>
        <button id="play-again" class="btn-primary">Play Again</button>
      </div>

      <button id="back-btn" class="btn-danger">← New Game</button>
    </div>
  </div>

  <!-- Parallel morphism site mark — links to personal site about page -->
  <a href="https://juliocdiaz.com/about" class="site-mark" aria-label="About">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="28" height="28">
      <g transform="translate(40, 40)">
        <circle cx="-24" cy="0" r="7" fill="currentColor"/>
        <circle cx="24" cy="0" r="7" fill="currentColor"/>
        <line x1="-10" y1="-5" x2="6" y2="-5" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
        <polygon points="12,-5 4,-12 4,2" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <line x1="-10" y1="5" x2="6" y2="5" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
        <polygon points="12,5 4,-2 4,12" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </g>
    </svg>
  </a>

  <script src="game.js"></script>
</body>
</html>
